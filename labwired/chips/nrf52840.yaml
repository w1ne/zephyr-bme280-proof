name: "nrf52840"
arch: "arm"
core: "cortex-m4"
flash:
  base: 0x00000000
  size: "1024KB"
ram:
  base: 0x20000000
  size: "256KB"
peripherals:
  - id: "uart0"
    type: "nrf52840_uart"
    base_address: 0x40002000
    size: "4KB"
    irq: 2
  # SPIM0/TWIM0 share 0x40003000; active peripheral selected by ENABLE (6=TWIM, 7=SPIM).
  - id: "i2c0"
    type: "nrf52840_serial"
    base_address: 0x40003000
    size: "4KB"
    irq: 3
  - id: "gpio0"
    type: "gpio"
    base_address: 0x50000000
    size: "4KB"
    config:
      profile: "nrf52"
  - id: "gpio1"
    type: "gpio"
    base_address: 0x50001000
    size: "4KB"
    config:
      profile: "nrf52"
      num_pins: 16
  # nRF52840 peripherals — reset values verified against nRF52840 silicon
  # (Seeed XIAO nRF52840 Sense, ST-LINK V2, 2026-06-09). Verified via the
  # nrf52_onboarding_diff register sweep (21 MODELLED + WDT). Addresses are
  # the sim memory map (P1/gpio1 remapped to 0x50001000 to avoid GPIO0's 4KB window).
  - id: "uart1"
    type: "nrf52840_uart"
    base_address: 0x40028000
    size: "4KB"
    irq: 40
  - id: "rtc0"
    type: "nrf52840_rtc"
    base_address: 0x4000b000
    size: "4KB"
    irq: 11
  - id: "rtc1"
    type: "nrf52840_rtc"
    base_address: 0x40011000
    size: "4KB"
    irq: 17
    config:
      num_cc: 4
  - id: "rtc2"
    type: "nrf52840_rtc"
    base_address: 0x40024000
    size: "4KB"
    irq: 36
    config:
      num_cc: 4
  - id: "wdt"
    type: "nrf52840_watchdog"
    base_address: 0x40010000
    size: "4KB"
    irq: 16
  - id: "ppi"
    type: "nrf52840_ppi"
    base_address: 0x4001f000
    size: "4KB"
  - id: "clock"
    type: "nrf_clock"
    base_address: 0x40000000
    size: "4KB"
    irq: 0
  - id: "spi2"
    type: "nrf52840_spi"
    base_address: 0x40023000
    size: "4KB"
    irq: 35
  - id: "gpiote"
    type: "nrf52840_gpiotasksevents"
    base_address: 0x40006000
    size: "4KB"
    irq: 6
  - id: "twi1"
    type: "nrf52840_i2c"
    base_address: 0x40004000
