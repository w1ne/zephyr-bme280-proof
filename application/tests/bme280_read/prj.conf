CONFIG_ZTEST=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME280=y

# LabWired's Cortex-M4 core returns 0 for MPU TYPE.DREGION (no regions),
# so mpu_configure_static_mpu_regions always fails with -EINVAL.  The
# resulting __ASSERT(0,...) → svc-2 → no-op cycle repeats on every kernel
# interrupt and prevents the firmware from completing init.  Disable the MPU
# driver entirely so the simulator boots to main() without the assertion loop.
CONFIG_ARM_MPU=n
CONFIG_HW_STACK_PROTECTION=n
